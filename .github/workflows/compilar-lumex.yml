name: Compilacion Automatizada Lumex

# Se activa en cada guardado de cambios (push) en la rama principal
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest # La máquina potente de 16 GB de RAM que nos prestan
    
    steps:
    - name: 1. Descargar codigo fuente de Lumex
      uses: actions/checkout@v3

    - name: 2. Configurar entorno Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: 3. Iniciar sesion en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 4. Compilar en C++ y Subir a Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Forzamos la compilación para arquitectura AMD/Intel (Tus servidores gratis de Oracle)
        platforms: linux/amd64
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/lumex-node:latest
