name: Compilacion Automatizada Lumex

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-22.04

    steps:
    - name: 1. Descargar codigo fuente
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: 2. Instalar dependencias nativas
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential cmake git boost-all-dev libssl-dev libgmp-dev

    - name: 3. Compilar Nodo de Lumex
      run: |
        mkdir build
        cd build
        cmake -DPLATFORM=linux -DCMAKE_BUILD_TYPE=Release ..
        make lumex_node -j$(nproc)

    - name: 4. Autenticar en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 5. Crear y Subir Contenedor final
      run: |
        cat <<EOF > Dockerfile.express
        FROM ubuntu:22.04
        ENV DEBIAN_FRONTEND=noninteractive
        RUN apt-get update && apt-get install -y --no-install-recommends \
            libboost-program-options-dev \
            libboost-filesystem-dev \
            libboost-thread-dev \
            libssl-dev \
            && rm -rf /var/lib/apt/lists/*
        COPY build/lumex_node /usr/local/bin/lumex_node
        WORKDIR /root/LumexData
        VOLUME /root/LumexData
        EXPOSE 7075/udp 7075/tcp 7076/tcp
        CMD ["lumex_node", "--daemon"]
        EOF
        
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/lumex-node:latest -f Dockerfile.express .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/lumex-node:latest
